{% extends 'layout.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
  <div class="row">
    <div class="col-lg-10">
      <h1>{{ page_title }}</h1>
      <p class="text-muted">Role: {{ role_label }}</p>
      <div class="card shadow-sm">
        <div class="card-body">
          <p class="mb-0">This is a placeholder page for {{ role_label }} &raquo; {{ page_title }}. Add form fields or data here when the feature is ready.</p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
