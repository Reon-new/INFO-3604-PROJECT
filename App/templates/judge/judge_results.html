{% extends 'layout.html' %}

{% block title %}Judge - Results{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-10">
    <h1>Judging Results</h1>
    <div class="card shadow-sm">
      <div class="card-body">
        <table class="table table-striped">
          <thead>
            <tr><th>Presentation ID</th><th>Title</th><th>Average Score</th></tr>
          </thead>
          <tbody>
            {% for row in ranking %}
            <tr>
              <td>{{ row[0] }}</td>
              <td>{{ row[1] }}</td>
              <td>{{ '%.2f'|format(row[2] or 0) }}</td>
            </tr>
            {% else %}
            <tr><td colspan="3" class="text-center">No ranking data available.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
